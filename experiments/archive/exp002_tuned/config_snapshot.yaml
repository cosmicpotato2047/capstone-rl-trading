# 캡스톤 실험 설정 파일
# 모든 하이퍼파라미터의 단일 진실 공급원 (single source of truth)
# 설정 변경 시 experiments/ 하위 폴더에 config_snapshot.yaml로 복사본 저장

# ────────────────────────────────────────
# 데이터
# ────────────────────────────────────────
# ⚠️ 중요: yfinance 1h 데이터는 최근 730일(약 2년)까지만 제공한다.
#    2018년부터 필요하므로 Binance API (ccxt) 사용 필요.
#    다운로드 스크립트: scripts/download_data.py 참고.
data:
  symbol: "BTC/USDT"            # ccxt Binance 기호
  interval: "1h"                # 1시간봉
  train_start: "2020-01-01"     # Binance BTC/USDT 상장일 기준
  train_end:   "2022-12-31"     # 상승·하락·횡보 레짐 포함
  val_start:   "2023-01-01"
  val_end:     "2023-12-31"
  test_start:  "2024-01-01"     # 봉인 — 학습 완료 전 절대 열람 금지
  test_end:    null             # null = 현재까지

# ────────────────────────────────────────
# State 구성 지표
# ────────────────────────────────────────
indicators:
  # log_price 계산용
  price_lookback: 168           # 7일 × 24h = 168봉 rolling mean

  # volatility 계산용 (ATR 기반)
  atr_period: 168               # 7일 × 24h

  # rolling z-score 정규화 window (모든 state 변수 공통)
  zscore_window: 168

# ────────────────────────────────────────
# State 변수 (5차원)
# ────────────────────────────────────────
# 0. log_price           = log(price / price.rolling(168).mean())
# 1. divergence          = (avg_price - price) / avg_price  (미보유 시 0)
# 2. holdings_value_ratio = (holdings × price) / start_capital  (미보유 시 0)
# 3. cash_ratio          = cash / start_capital
# 4. volatility          = ATR(168) / price
# → 모두 rolling z-score 정규화 후 observation space에 입력

# ────────────────────────────────────────
# 환경 (MDP)
# ────────────────────────────────────────
environment:
  initial_cash: 10000.0         # USD

  # 거래비용 — Binance 지정가 maker fee 기준
  transaction_cost: 0.0005      # 0.05% per trade

  # 주문 개수 (1학기 고정)
  n_buy_orders: 2               # buy_hi, buy_lo
  n_sell_orders: 2              # sell_lo, sell_hi

  # 예산 분할 — 사이클 시작 시 현금을 n_splits 슬롯으로 나눔
  # per_order_size = (cycle_start_cash / n_splits) / n_buy_orders
  # 예: cash=10000, n_splits=4, n_buy_orders=2 → slot=2500, per_order=1250
  # 슬롯 소진(cycle_budget_remaining < per_order_size) 후 추가 매수 완전 차단
  n_splits: 4                   # 사이클당 총 매수 슬롯 수 (Val 셋 튜닝 예정)

  # 사이클 정의
  # 시작: holdings == 0 → 첫 체결
  # 종료: holdings > 0 → holdings == 0 (전량 매도)

# ────────────────────────────────────────
# Action 공간 (2차원 연속)
# ────────────────────────────────────────
# aggressiveness ∈ [0, 1]
#   buy_hi_gap = 0.0001 + aggressiveness × 0.05   → [0.01%, 5%]
#   buy_lo_gap = 0.001  + aggressiveness × 0.10   → [0.1%, 10%]
#
# profit_target ∈ [0, 1]
#   sell_lo_gap = 0.0001 + profit_target × 0.05   → [0.01%, 5%]
#   sell_hi_gap = 0.001  + profit_target × 0.15   → [0.1%, 15%]
#
# 체결 판단: 다음 봉 high/low 기준
#   next_high >= sell_lo → sell_lo 체결
#   next_low  <= buy_hi  → buy_hi  체결

# ────────────────────────────────────────
# PPO 에이전트 (stable-baselines3)
# ────────────────────────────────────────
agent:
  algorithm: "PPO"
  policy: "MlpPolicy"
  learning_rate: 0.0001         # exp001(3e-4) → 절반 이하로 감소, 수렴 안정성
  n_steps: 4096                 # exp001(2048) → 2배, 긴 에피소드(25k봉) 대응
  batch_size: 128               # n_steps 증가에 맞춰 조정
  n_epochs: 10
  gamma: 0.99                   # 할인율
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.005               # exp001(0.01) → 절반, 수렴 방해 요인 감소
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 1000000      # 동일 유지 (비교 공정성)

# ────────────────────────────────────────
# 베이스라인
# ────────────────────────────────────────
baselines:
  # 1. Buy-and-Hold
  buy_and_hold: true

  # 2. 고정 그리드 봇 (간격 고정)
  fixed_grid:
    gaps: [0.01, 0.02, 0.05]    # 1%, 2%, 5% 세 가지 비교

  # 3. ATR 비례 그리드 봇 (규칙 기반 적응)
  atr_grid:
    k_values: [0.5, 1.0, 2.0]   # gap = k × (ATR_168 / price)
    # sell_gap = buy_gap × 1.0  (대칭 설정)

# ────────────────────────────────────────
# 평가 지표
# ────────────────────────────────────────
evaluation:
  metrics:
    - "total_return"
    - "sharpe_ratio"             # 주 평가 기준
    - "max_drawdown"
    - "n_trades"
    - "avg_cycle_pnl"
    - "avg_cycle_hours"

# ────────────────────────────────────────
# 학습 설정
# ────────────────────────────────────────
training:
  seed: 42
  eval_freq: 50000              # 몇 스텝마다 val 셋으로 평가
  n_eval_episodes: 3
  experiment_name: "exp002_tuned"
  log_dir: "experiments/exp002_tuned"
