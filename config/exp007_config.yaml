# exp007 실험 설정
# 베이스: exp006_config.yaml
# 변경 사항:
#   - VecNormalize 완전 비활성화
#     근거: obs가 이미 z-score 정규화되어 있음 (zscore_log_price, zscore_volatility)
#           train(n_envs=4, random_start) 학습 obs_rms ≠ val 추론 obs 분포
#           → 이중 정규화 + 분포 불일치로 best_model evaluate() 시 이상 행동 발생
#   - Multi-episode 평가 활성화 (n_eval_episodes=5)
#     근거: 학습 에피소드(2016스텝 랜덤 시작)와 동일한 방식으로 val 평가
#           단일 8,568스텝 에피소드 평가는 학습 분포와 다름
#   - 나머지: exp006 동일 (n_envs=4, max_episode_steps=2016, random_start=true)

# ────────────────────────────────────────
# 데이터
# ────────────────────────────────────────
data:
  symbol: "BTC/USDT"
  interval: "1h"
  train_start: "2020-01-01"
  train_end:   "2022-12-31"
  val_start:   "2023-01-01"
  val_end:     "2023-12-31"
  test_start:  "2024-01-01"
  test_end:    null

# ────────────────────────────────────────
# State 구성 지표
# ────────────────────────────────────────
indicators:
  price_lookback: 168
  atr_period: 168
  zscore_window: 168

# ────────────────────────────────────────
# 환경 (MDP)
# ────────────────────────────────────────
environment:
  initial_cash: 10000.0
  transaction_cost: 0.0005

  n_buy_orders: 2
  n_sell_orders: 2
  n_splits: 4

  random_start: true

# ────────────────────────────────────────
# PPO 에이전트
# ────────────────────────────────────────
agent:
  algorithm: "PPO"
  policy: "MlpPolicy"

  learning_rate: 0.0003
  lr_schedule: "cosine"
  lr_end: 0.00001

  n_steps: 8192
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

  n_envs: 4

  total_timesteps: 3000000

# ────────────────────────────────────────
# VecNormalize — exp007: 완전 비활성화
# obs가 이미 z-score 정규화됨 (이중 정규화 방지)
# ────────────────────────────────────────
vec_normalize:
  enabled: false

# ────────────────────────────────────────
# 베이스라인
# ────────────────────────────────────────
baselines:
  buy_and_hold: true
  fixed_grid:
    gaps: [0.01, 0.02, 0.05]
  atr_grid:
    k_values: [0.5, 1.0, 2.0]

# ────────────────────────────────────────
# 학습 설정
# ────────────────────────────────────────
training:
  seed: 42
  eval_freq: 50000
  n_eval_episodes: 5              # val에서 5개 시작점 × 2016스텝 → 평균 Sharpe
  experiment_name: "exp007_no_vecnorm_multi_eval"
  log_dir: "experiments/exp007_no_vecnorm_multi_eval"

  max_episode_steps: 2016

  save_freq: 500000
  save_best: true
