# 베이스: exp013b (n_splits=2, threshold=avg_price) / 변경: n_buy_orders 2→3
# 신설계: n_buy_orders = 가격 레벨 수 (buy_hi~buy_lo 선형 보간 3레벨)

data:
  symbol: "BTC/USDT"
  interval: "1h"
  train_start: "2020-01-01"
  train_end:   "2022-12-31"
  val_start:   "2023-01-01"
  val_end:     "2023-12-31"
  test_start:  "2024-01-01"
  test_end:    null

indicators:
  price_lookback: 168
  atr_period: 168
  zscore_window: 168

environment:
  initial_cash: 10000.0
  transaction_cost: 0.0005

  n_buy_orders: 3
  n_splits: 2
  threshold_basis: "avg_price"

  random_start: true

agent:
  algorithm: "PPO"
  policy: "MlpPolicy"

  learning_rate: 0.0003
  lr_schedule: "cosine"
  lr_end: 0.00001

  n_steps: 8192
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5

  n_envs: 4
  total_timesteps: 3000000

vec_normalize:
  enabled: false

baselines:
  buy_and_hold: true
  fixed_grid:
    gaps: [0.01, 0.02, 0.05]
  atr_grid:
    k_values: [0.5, 1.0, 2.0]

training:
  seed: 42
  eval_freq: 50000
  n_eval_episodes: 5
  experiment_name: "exp014a_v2_nbuy_3"
  log_dir: "experiments/exp014a_v2_nbuy_3"
  max_episode_steps: 2016
  save_freq: 500000
  save_best: true
