# exp005 실험 설정
# 베이스: exp004_config.yaml
# 변경 사항:
#   - Action 공식 최소 gap 계수 상향: [0.1, 1.0] → [0.5, 2.0]
#     근거: exp004에서 agg=0 고착 시 val p10 ATR(0.35%)에서 round-trip net < 0
#           0.5×ATR 최솟값으로 p10에서도 round-trip net = +0.25% 보장
#   - 나머지 하이퍼파라미터: exp004 동일

# ────────────────────────────────────────
# 데이터 (experiment_config.yaml 동일)
# ────────────────────────────────────────
data:
  symbol: "BTC/USDT"
  interval: "1h"
  train_start: "2020-01-01"
  train_end:   "2022-12-31"
  val_start:   "2023-01-01"
  val_end:     "2023-12-31"
  test_start:  "2024-01-01"
  test_end:    null

# ────────────────────────────────────────
# State 구성 지표 (experiment_config.yaml 동일)
# ────────────────────────────────────────
indicators:
  price_lookback: 168
  atr_period: 168
  zscore_window: 168

# ────────────────────────────────────────
# 환경 (MDP)
# ────────────────────────────────────────
environment:
  initial_cash: 10000.0
  transaction_cost: 0.0005

  n_buy_orders: 2                # buy_hi (공격적), buy_lo (보수적)
  n_sell_orders: 2               # sell_market (현재가 기준), sell_cost (평단가 기준)

  n_splits: 4

# ────────────────────────────────────────
# PPO 에이전트 (stable-baselines3)
# ────────────────────────────────────────
agent:
  algorithm: "PPO"
  policy: "MlpPolicy"

  learning_rate: 0.0003          # 초기값 (cosine decay 시작점)
  lr_schedule: "cosine"
  lr_end: 0.00001

  n_steps: 8192
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

  total_timesteps: 3000000

# ────────────────────────────────────────
# VecNormalize (observation + reward 정규화)
# ────────────────────────────────────────
vec_normalize:
  enabled: true
  norm_obs: true
  norm_reward: true
  clip_obs: 10.0
  clip_reward: 10.0
  gamma: 0.99

# ────────────────────────────────────────
# 베이스라인 (train_ppo.py 비교용)
# ────────────────────────────────────────
baselines:
  buy_and_hold: true
  fixed_grid:
    gaps: [0.01, 0.02, 0.05]
  atr_grid:
    k_values: [0.5, 1.0, 2.0]

# ────────────────────────────────────────
# 학습 설정
# ────────────────────────────────────────
training:
  seed: 42
  eval_freq: 50000
  n_eval_episodes: 3
  experiment_name: "exp005_min_gap_fix"
  log_dir: "experiments/exp005_min_gap_fix"

  save_freq: 500000
  save_best: true
