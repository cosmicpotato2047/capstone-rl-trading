# exp032b — Reward Variant 비교 (sym, baseline)
#
# 목적: 4 reward variant (sym/asym/dsr/pt) × 5 seeds 비교의 sym baseline.
#       본 논문 §5 Positive finding 의 메인 비교 단위.
#
# 변경점 (vs exp030):
#   - reward_type: "sym" 명시 (exp030 은 default "asym" + β=1.0 = sym 동치)
#   - experiment_name / log_dir 분리
#   - total_timesteps 1M (그대로)
#
# 사용 hyperparameter:
#   - sym 은 hyperparameter 없음 (baseline)
#   - exp032a Optuna 결과: 해당 없음

# ────────────────────────────────────────
data:
  symbol: "BTC/USDT"
  interval: "1h"
  train_start: "2017-08-17"
  train_end:   "2020-12-31"
  val_start:   "2021-01-01"
  val_end:     "2023-12-31"
  test_start:  "2024-01-01"
  test_end:    null

indicators:
  price_lookback: 168
  atr_period: 168
  zscore_window: 168
  trend_windows: [72, 168, 336, 720, 1440]
  trend_short: 72
  trend_long: 720

# ────────────────────────────────────────
# 환경 (Env-v4 + reward variant: sym)
# ────────────────────────────────────────
environment:
  initial_cash: 10000.0
  transaction_cost: 0.0005
  random_start: true
  n_buy_orders: 2
  n_splits: 2
  threshold_basis: "avg_price"
  reward_type: "sym"             # ← variant 지정
  formula_coefs:
    A_b: 1.665
    B_b: 1.748
    C_b: 6.070
    D_b: 18.683
    A_s: 0.285
    B_s: 1.95
    C_s: 1.951
    D_s: 7.5

# ────────────────────────────────────────
# PPO (exp030 안정화 패키지 동일)
# ────────────────────────────────────────
agent:
  algorithm: "PPO"
  policy: "MlpPolicy"
  learning_rate: 0.0003
  lr_schedule: "linear"
  lr_end: 0.00001
  n_steps: 4096
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  ent_coef_end: 0.001
  ent_schedule: "linear"
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.02
  total_timesteps: 1_000_000
  n_envs: 4

baselines:
  buy_and_hold: true
  fixed_grid:
    gaps: [0.01, 0.02, 0.05]
  atr_grid:
    k_values: [0.5, 1.0, 2.0]

evaluation:
  metrics:
    - "total_return"
    - "sharpe_ratio"
    - "max_drawdown"
    - "n_trades"
    - "avg_cycle_pnl"
    - "avg_cycle_hours"

training:
  seed: 42                       # 5 seeds 는 [42, 43, 44, 45, 46] 순회 (script 측에서 처리)
  eval_freq: 50000
  n_eval_episodes: 5
  max_episode_steps: 2000
  early_stopping_patience: 10
  experiment_name: "exp032b_sym"
  log_dir: "experiments/exp032b_sym"
