# 캡스톤 실험 설정 파일
# 모든 하이퍼파라미터의 단일 진실 공급원 (single source of truth)
# 설정 변경 시 experiments/ 하위 폴더에 config_snapshot.yaml로 복사본 저장

# ────────────────────────────────────────
# 데이터
# ────────────────────────────────────────
# ⚠️ 중요: yfinance 1h 데이터는 최근 730일(약 2년)까지만 제공한다.
#    2018년부터 필요하므로 Binance API (ccxt) 사용 필요.
#    다운로드 스크립트: scripts/download_data.py 참고.
data:
  symbol: "BTC/USDT"            # ccxt Binance 기호
  interval: "1h"                # 1시간봉
  train_start: "2017-08-17"     # Binance BTC/USDT 최초 상장일
  train_end:   "2020-12-31"     # BEAR 2018 + 혼재 2019 + BULL 2020 (BULL 46%, BEAR 38%, SIDE 15%)
  val_start:   "2021-01-01"     # ATH→대폭락→회복 사이클 (BULL 22%, BEAR 33%, SIDE 44%)
  val_end:     "2023-06-30"     # 2021 혼재 + 2022 BEAR(-64%) + 2023H1 회복
  test_start:  "2023-07-01"     # 봉인 — 학습 완료 전 절대 열람 금지
  test_end:    null             # null = 현재까지 (BULL 45%, BEAR 36%, SIDE 18%)

# ────────────────────────────────────────
# State 구성 지표
# ────────────────────────────────────────
indicators:
  # log_price 계산용
  price_lookback: 168           # 7일 × 24h = 168봉 rolling mean

  # volatility 계산용 (ATR 기반)
  atr_period: 168               # 7일 × 24h

  # rolling z-score 정규화 window (모든 state 변수 공통)
  zscore_window: 168

# ────────────────────────────────────────
# State 변수 (7차원) — Phase 2 재설계
# ────────────────────────────────────────
# 0. log_price            = log(price / price.rolling(168).mean())
# 1. divergence           = (avg_price - price) / avg_price  (미보유 시 0)
# 2. holdings_value_ratio = (holdings × price) / start_capital  (미보유 시 0)
# 3. cash_ratio           = cash / start_capital
# 4. volatility           = ATR(168) / price
# 5. trend_1d             = pct_change(24)  — 24h 단기 방향성 (regime 감지용)
# 6. trend_1w             = pct_change(168) — 168h 주간 방향성 (regime 감지용)
# → 모두 rolling z-score 정규화 후 observation space에 입력

# ────────────────────────────────────────
# 환경 (MDP)
# ────────────────────────────────────────
environment:
  initial_cash: 10000.0         # USD

  # 거래비용 — Binance 지정가 maker fee 기준
  transaction_cost: 0.0005      # 0.05% per trade

  # 주문 개수
  n_buy_orders: 2               # buy_hi, buy_lo

  # 예산 분할 — 사이클 시작 시 현금을 n_splits 슬롯으로 나눔
  n_splits: 3              # exp023 최적화 결과 (이전: 4)

  # sell_market 임계값 기준: "price" | "avg_price"
  threshold_basis: "avg_price"

  # ── 공식 계수 (exp023 ATR 전용 Bayesian 최적화 결과) ──────
  # exp023_atr_optuna Trial #45 (Val Sharpe 60.723)
  # 탐색 대상: A_b, C_b, A_s, C_s, n_splits (B_b/D_b/B_s/D_s는 RL 전용)
  formula_coefs:
    A_b: 0.1061   # buy_hi = price × (1 - A_b × ATR)  이전: 0.285
    B_b: 1.748    # RL 전용 (ATR 고정 시스템에서 미사용)
    C_b: 13.9205  # buy_lo = price × (1 - C_b × ATR)  이전: 5.223
    D_b: 18.683   # RL 전용 (ATR 고정 시스템에서 미사용)
    A_s: 0.0796   # sell_market_gap = A_s × ATR        이전: 0.05
    B_s: 1.95     # RL 전용 (ATR 고정 시스템에서 미사용)
    C_s: 4.3085   # sell_cost_gap = C_s × ATR          이전: 2.5  ★핵심 개선
    D_s: 7.5      # RL 전용 (ATR 고정 시스템에서 미사용)

  # budget_fraction 최솟값 (action[0]=0일 때 투입 비율 하한)
  entry_gate_threshold: 0.5         # action[0] ≥ 0.5 → 진입 허가

  # 랜덤 시작점 (멀티 환경 학습용)
  random_start: true

  # 사이클 정의
  # 시작: holdings == 0 → 첫 체결
  # 종료: holdings > 0 → holdings == 0 (전량 매도)

# ────────────────────────────────────────
# Action 공간 (2차원 연속) — exp021 재설계
# ────────────────────────────────────────
# [0] entry_gate ∈ [0, 1]
#   임계값 0.5: raw ≥ 0.5 → 진입 허가, raw < 0.5 → 진입 차단
#   holdings==0 (새 사이클 시작) 일 때만 적용
#   진행 중인 사이클(holdings > 0)에는 영향 없음
#   → 레짐 적응 핵심: 하락장 진입 차단 → 손실 회피
#
# [1] profit_target ∈ [0, 1]
#   sell_market_gap = atr_ratio × (A_s + profit_target × B_s)
#   sell_cost_gap   = atr_ratio × (C_s + profit_target × D_s)
#
# aggressiveness는 exp018에서 항상 0 수렴 → 0.0 고정
#   buy_hi_gap = atr_ratio × A_b  (고정)
#   buy_lo_gap = atr_ratio × C_b  (고정)

# ────────────────────────────────────────
# PPO 에이전트 (stable-baselines3)
# ────────────────────────────────────────
agent:
  algorithm: "PPO"
  policy: "MlpPolicy"
  learning_rate: 0.0000145      # Optuna exp020 Trial #21 (Val 2021-23H1, Sharpe 48.249)
  n_steps: 2048                 # Optuna 최적값
  batch_size: 64
  n_epochs: 10
  gamma: 0.999                  # Optuna 최적값 — 장기 사이클 대응 (0.974→0.999)
  gae_lambda: 0.928             # Optuna 최적값
  clip_range: 0.127             # Optuna 최적값
  ent_coef: 0.0010              # Optuna 최적값 — 탐색 극소화
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 1_000_000
  n_envs: 4                     # 병렬 환경 수

# ────────────────────────────────────────
# 베이스라인
# ────────────────────────────────────────
baselines:
  # 1. Buy-and-Hold
  buy_and_hold: true

  # 2. 고정 그리드 봇 (간격 고정)
  fixed_grid:
    gaps: [0.01, 0.02, 0.05]    # 1%, 2%, 5% 세 가지 비교

  # 3. ATR 비례 그리드 봇 (규칙 기반 적응)
  atr_grid:
    k_values: [0.5, 1.0, 2.0]   # gap = k × (ATR_168 / price)
    # sell_gap = buy_gap × 1.0  (대칭 설정)

# ────────────────────────────────────────
# 평가 지표
# ────────────────────────────────────────
evaluation:
  metrics:
    - "total_return"
    - "sharpe_ratio"             # 주 평가 기준
    - "max_drawdown"
    - "n_trades"
    - "avg_cycle_pnl"
    - "avg_cycle_hours"

# ────────────────────────────────────────
# 학습 설정
# ────────────────────────────────────────
training:
  seed: 42
  eval_freq: 50000
  n_eval_episodes: 3
  max_episode_steps: 2000       # ~83일 단위 에피소드 (다양한 regime 노출)
  experiment_name: "exp021_entry_gate"
  log_dir: "experiments/exp021_entry_gate"
